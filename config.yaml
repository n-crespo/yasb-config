# https://github.com/amnweb/yasb/wiki
watch_stylesheet: true
watch_config: true
debug: false
bars:
  primary-bar:
    enabled: true
    screens: ["*"]
    class_name: "yasb-bar"
    alignment:
      position: "top"
      center: true
    animation:
      enabled: true
      duration: 200
    blur_effect:
      enabled: false
      acrylic: false
      dark_mode: true
      round_corners: false
      # round_corners_type: "small"
      # border_color: "#00000000"
    window_flags:
      always_on_top: false
      windows_app_bar: true
      hide_on_fullscreen: true
      auto_hide: false
    layouts:
      left:
        alignment: "left"
        stretch: true
      center:
        alignment: "center"
        stretch: true
      right:
        alignment: "right"
        stretch: true
    dimensions:
      width: "100%"
      height: 20
    widgets:
      # removed: "microphone", "power_menu", "home", "active_window", "apps"
      left: ["glazewm_workspaces"]
      center: ["clock"]
      right: [
          "quick_launch",
          "media",
          # "glazewm_tiling_direction",
          "bluetooth",
          "systray",
          "memory",
          "wifi-grouper",
          "volume",
          "battery",
        ]

widgets:
  quick_launch:
    type: "yasb.quick_launch.QuickLaunchWidget"
    options:
      label: ""
      search_placeholder: "Search..."
      max_results: 50
      show_icons: true
      home_page: false
      compact_mode: false
      compact_text: false
      icon_size: 32
      popup:
        width: 720
        height: 480
        blur: true
        round_corners: true
        round_corners_type: "normal"
        border_color: "system"
        dark_mode: true
      callbacks:
        on_left: "toggle_quick_launch"
      keybindings:
        - keys: "alt+space"
          action: "toggle_quick_launch"
      providers:
        ssh:
          enabled: true
          prefix: "ssh"
        apps:
          enabled: true
          prefix: "*"
          priority: 0
          show_recent: true
          max_recent: 5
          show_description: true
        calculator:
          enabled: true
          prefix: "*"
          priority: 2
        clipboard_history:
          enabled: true
          prefix: "v"
          priority: 3
          max_items: 30
          show_preview: true
        color:
          enabled: true
          prefix: "c"
          priority: 4
        currency:
          enabled: true
          prefix: "$"
          priority: 5
        emoji:
          enabled: true
          prefix: ":"
          priority: 7
        file_search:
          enabled: true
          prefix: "/"
          priority: 8
          backend: "auto"
          show_path: true
          show_preview: true
        kill_process:
          enabled: true
          prefix: "kill"
          priority: 12
        settings:
          enabled: true
          prefix: "s"
          priority: 14
        snippets:
          enabled: true
          prefix: ";"
          priority: 15
          type_delay: 200
        system_commands:
          enabled: true
          prefix: "*"
          priority: 16
        unit_converter:
          enabled: true
          prefix: "u"
          priority: 17
        web_search:
          enabled: true
          prefix: "*"
          priority: 99
          engine: "google"
        windows_terminal:
          enabled: true
          prefix: "wt"
          priority: 21

  wifi-grouper:
    type: "yasb.grouper.GrouperWidget"
    options:
      class_name: "wifi-grouper"
      widgets: ["wifi"]

  ############## LEFT ############
  glazewm_workspaces:
    update_interval: 50
    type: "glazewm.workspaces.GlazewmWorkspacesWidget"
    options:
      offline_label: "GlazeWM Offline"
      hide_empty_workspaces: false
      hide_if_offline: false
      enable_scroll_switching: false
      populated_label: "{display_name}"
      empty_label: "{display_name}"
      active_populated_label: "{display_name}"
      active_empty_label: "{display_name}"
      animation: true
      app_icons:
        {
          "enabled_populated": true,
          "enabled_active": true,
          "size": 13,
          "max_icons": 0,
          "hide_label": False,
          "hide_duplicates": False,
          "hide_floating": False,
        }

  ########### CENTER #############
  media:
    type: "yasb.media.MediaWidget"
    options:
      media_menu:
        blur: true
        round_corners: true
        round_corners_type: "normal"
        border_color: "system"
        alignment: "right"
        direction: "down"
        offset_top: 6
        offset_left: 0
        thumbnail_corner_radius: 8
        thumbnail_size: 120
        max_title_size: 60
        max_artist_size: 20
        show_source: true
        show_volume_slider: false
      label: "{title} - {artist}"
      label_alt: ".."
      max_field_size:
        label: 28
        label_alt: 25
      controls_only: false
      controls_left: true
      hide_empty: true
      label_shadow:
        enabled: false
      show_thumbnail: false
      symmetric_corner_radius: true
      media_menu_icons:
        prev_track: "󰒮"
        next_track: "󰒭"
        play: "󰐊"
        pause: "󰏤"
      icons:
        prev_track: ""
        next_track: ""
        play: "󰐊"
        pause: "󰏤"
      callbacks:
        on_right: "toggle_media_menu"
        on_middle: "toggle_label"
        on_left: "toggle_play_pause"
      scrolling_label:
        enabled: false # Whether to enable the scrolling label.
        update_interval_ms: 33 # The update interval for the scrolling label in milliseconds.
        style: "bounce" # The style of the scrolling label. Can be "left", "right", "bounce", or "bounce-ease".
        separator: " | " # The separator between repeating text in "left" or "right" scrolling style.
        label_padding: 1 # The padding around the label in "bounce" and "bounce-ease" style. By default it's one character on each side.
        ease_slope: 20 # The easing slope for the bounce effect. Easing curve params: https://www.desmos.com/calculator/j7eamemxzi
        ease_pos: 0.8 # The easing curve position for the bounce effect.
        ease_min: 0.5 # The minimum value for the bounce effect easing curve.

  systray:
    type: "yasb.systray.SystrayWidget"
    options:
      class_name: "systray"
      label_collapsed: ""
      label_expanded: "󰍴"
      label_position: "right" # Can be "left" or "right"
      icon_size: 14 # Can be any integer between 8 and 64
      pin_click_modifier: "alt" # Can be "ctrl", "alt" or "shift"
      show_unpinned: false
      show_unpinned_button: true
      show_battery: false
      show_volume: false
      show_network: false
      btn_shadow:
        enabled: false

  ######### RIGHT ###########
  memory:
    type: "yasb.memory.MemoryWidget"
    options:
      # label_alt: "{virtual_mem_percent}%"
      label_alt: "" # virtual_mem_used
      label: "{virtual_mem_used}"
      update_interval: 3000
      animation:
        enabled: true
        type: "fadeInOut"
        duration: 200
      callbacks:
        on_left: "toggle_menu"
        on_right: "exec cmd /c Taskmgr"
      memory_thresholds:
        low: 25
        medium: 50
        high: 95
      menu:
        enabled: true
        show_graph: true
        show_graph_grid: true
        graph_history_size: 60
      progress_bar:
        enabled: true
        size: 13
        color: "#555555"
        background_color: "#242424"
        thickness: 2
      hide_decimal: false
      histogram_icons:
        - "\u2581" # 0%
        - "\u2581" # 10%
        - "\u2582" # 20%
        - "\u2583" # 30%
        - "\u2584" # 40%
        - "\u2585" # 50%
        - "\u2586" # 60%
        - "\u2587" # 70%
        - "\u2588" # 80%+

  glazewm_tiling_direction:
    type: "glazewm.tiling_direction.GlazewmTilingDirectionWidget"
    options:
      horizontal_label: ""
      vertical_label: ""

  bluetooth:
    type: "yasb.bluetooth.BluetoothWidget"
    options:
      tooltip: true
      animation:
        enabled: true
        type: "fadeInOut"
      label: "<span>{icon}</span>{device_name}"
      label_alt: "<span>󰂯</span>"
      label_no_device: ""
      device_aliases:
        - name: "Nothing Ear (a)"
          alias: "󱡏"
        - name: "iPhone"
          alias: ""
        - name: "HK Onyx Studio 6"
          alias: "󰓃"
        - name: "Zubin’s JBL 2"
          alias: "󰴸"
      icons:
        bluetooth_on: ""
        bluetooth_off: ""
        bluetooth_connected: ""
      callbacks:
        on_right: "exec cmd.exe /c start ms-actioncenter:controlcenter/bluetooth"
        on_left: toggle_label
      label_shadow:
        enabled: false

  wifi:
    type: "yasb.wifi.WifiWidget"
    options:
      label: "<span>{wifi_icon}</span> {wifi_name}"
      label_alt: "<span>{wifi_icon}</span>"
      update_interval: 2000
      animation:
        enabled: true
        type: fadeInOut
        duration: 200
      wifi_icons:
        [
          "\udb82\udd2e",
          "\udb82\udd1f",
          "\udb82\udd22",
          "\udb82\udd25",
          "\udb82\udd28",
        ]
        # - "󰤯" # 0% strength (no wifi)
        # - "󰤟" # 1-25% strength
        # - "󰤢" # 26-50% strength
        # - "󰤥" # 51-75% strength
        # - "󰤨" # 76-100% strength. Alternate theming: \uf1eb
      callbacks:
        on_middle: "exec cmd.exe /c start ms-settings:network"
        on_right: "exec cmd.exe /c start ms-actioncenter:controlcenter/wifi"
        on_left: "toggle_label"

  volume:
    type: "yasb.volume.VolumeWidget"
    options:
      mute_text: "0%"
      animation:
        enabled: True
      label: "<span>{icon}</span> {level}"
      label_alt: "{volume}"
      tooltip: true
      slider_beep: false
      audio_menu:
        blur: true # Enable blur effect for the menu
        round_corners: true # Enable round corners for the menu (not supported on Windows 10)
        round_corners_type: "normal" # Set the type of round corners for the menu (normal, small) (not supported on Windows 10)
        border_color: "system" # Set the border color for the menu, "system", Hex color or None
        alignment: "right" # Set the alignment of the menu (left, right, center)
        direction: "down" # Set the direction of the menu (up, down)
        offset_top: 6 # Set the top offset of the menu
        offset_left: 0 # Set the left offset of the menu
        show_apps: true # Whether to show the list of applications with audio sessions
        show_app_labels: false # Whether to show application labels in the audio menu
        show_app_icons: true # Whether to show application icons in the audio menu
        show_apps_expanded: true # Whether application volumes are expanded by default when opening the menu
        app_icons: # Icons for the toggle button to expand/collapse application volumes
          toggle_down: "\uf078" # Icon for btn collapsed state
          toggle_up: "\uf077" # Icon for btn expanded state
      volume_icons:
        - "󰸈"
        - "󰖀"
        - "󰖀"
        - "󰕾"
        - "󰕾"
      callbacks:
        on_right: "toggle_volume_menu"
        on_left: "toggle_mute"
        on_middle: "exec cmd.exe /c start ms-actioncenter:controlcenter/volume"

  battery:
    type: "yasb.battery.BatteryWidget"
    options:
      label: "<span>{icon}</span>{percent}%"
      label_alt: "{time_remaining}"
      # time_remaining_natural: true # this seems to round down 😭
      time_remaining_natural: true
      status_thresholds:
        { critical: 10, low: 20, medium: 70, high: 90, full: 100 }
      charging_options:
        icon_format: "{icon}" # show only charging icon
      status_icons:
        icon_charging: "\ue83e"
        icon_critical: "\ue851"
        icon_low: "\ue853"
        icon_medium: "\ue856"
        icon_high: "\ue858"
        icon_full: "\ue83f"

  clock:
    type: "yasb.clock.ClockWidget"
    options:
      label: "{%a %b %d, %#I:%M %p}"
      timezones: []
      callbacks:
        on_left: "toggle_calendar"
        on_right: "toggle_calendar"
      calendar:
        blur: True
        round_corners: True
        round_corners_type: "normal"
        border_color: "System"
        alignment: "center"
        direction: "down"
        distance: 6
        show_holidays: true
        show_years: true
        country_code: "US"
        holiday_color: "#FF6464"
        extended: false
